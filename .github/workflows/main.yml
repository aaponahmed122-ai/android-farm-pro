name: CapCut Farm Final
on: workflow_dispatch

jobs:
  run-android:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          # ইমেজ ডাউনলোড করার জন্য জায়গা খালি করা
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"

      - name: Start Android Emulator
        run: |
          # সঠিক ইমেজ নাম: budtmo/docker-android:emulator_9.0
          # এটি গিটহাবে সাপোর্ট করে এমন একটি হালকা ভার্সন
          sudo docker run -d -p 6080:6080 \
            -e EMULATOR_DEVICE="Samsung Galaxy S10" \
            -e WEB_VNC=true \
            --privileged \
            --name android-container \
            budtmo/docker-android:emulator_9.0
          echo "অ্যান্ড্রয়েড ইঞ্জিন চালু হচ্ছে, ১ মিনিট অপেক্ষা করো..."

      - name: Setup Stable Connection
        run: |
          # ক্লাউডফ্লেয়ার ইনস্টল
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          echo "------------------------------------------"
          echo "আপনার ফোন স্ক্রিন লিঙ্কটি নিচে তৈরি হচ্ছে..."
          echo "লিঙ্কটি আসার পর ব্রাউজারে ওপেন করুন।"
          echo "------------------------------------------"
          
          # টানেল রান করা (পোর্ট ৬০৮০)
          sudo cloudflared tunnel --url http://localhost:6080
